name: nightly-sync-build
# Daily: sync this fork's master from upstream (preserving this workflow), and on any
# upstream change, cross-build cmd/olcrtc for the supported arches and publish a prerelease.
# Runs on the self-hosted NL VPS runner (label: olcrtc).
on:
  schedule:
    - cron: '23 3 * * *'   # 03:23 UTC daily (low-traffic hour for the VPS)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: nightly-sync-build
  cancel-in-progress: false
jobs:
  sync-build-release:
    runs-on: [self-hosted, olcrtc]
    timeout-minutes: 60
    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Sync master from upstream
        id: sync
        run: |
          set -eu
          git config user.name  "olcrtc-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git remote add upstream https://github.com/openlibrecommunity/olcrtc.git 2>/dev/null \
            || git remote set-url upstream https://github.com/openlibrecommunity/olcrtc.git
          git fetch upstream master
          before=$(git rev-parse HEAD)
          git merge --no-edit upstream/master
          after=$(git rev-parse HEAD)
          git push origin master
          echo "upstream_sha=$(git rev-parse --short upstream/master)" >> "$GITHUB_OUTPUT"
          if [ "$before" != "$after" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=yes" >> "$GITHUB_OUTPUT"
          else
            echo "build=no"  >> "$GITHUB_OUTPUT"
          fi
          echo "sync: before=$before after=$after event=${{ github.event_name }}"

      - name: Setup Go
        if: steps.sync.outputs.build == 'yes'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cross-build cmd/olcrtc (amd64, arm64, armv7, mips, mipsle)
        if: steps.sync.outputs.build == 'yes'
        run: |
          set -eux
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64                 go build -trimpath -ldflags '-s -w' -o dist/olcrtc-linux-amd64  ./cmd/olcrtc
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64                 go build -trimpath -ldflags '-s -w' -o dist/olcrtc-linux-arm64  ./cmd/olcrtc
          CGO_ENABLED=0 GOOS=linux GOARCH=arm   GOARM=7         go build -trimpath -ldflags '-s -w' -o dist/olcrtc-linux-armv7  ./cmd/olcrtc
          CGO_ENABLED=0 GOOS=linux GOARCH=mips  GOMIPS=softfloat go build -trimpath -ldflags '-s -w' -o dist/olcrtc-linux-mips   ./cmd/olcrtc
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -trimpath -ldflags '-s -w' -o dist/olcrtc-linux-mipsle ./cmd/olcrtc
          ( cd dist && sha256sum olcrtc-* | tee SHA256SUMS )
          ls -la dist

      - name: Publish prerelease
        if: steps.sync.outputs.build == 'yes'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.sync.outputs.upstream_sha }}
          name: olcRTC nightly ${{ steps.sync.outputs.upstream_sha }}
          prerelease: true
          body: |
            Automated daily build of olcRTC `./cmd/olcrtc` from upstream
            `openlibrecommunity/olcrtc@${{ steps.sync.outputs.upstream_sha }}`.
            Targets (linux): `amd64`, `arm64`, `armv7`, `mips` (softfloat), `mipsle` (softfloat). Built on the self-hosted NL VPS runner.
          files: |
            dist/olcrtc-linux-amd64
            dist/olcrtc-linux-arm64
            dist/olcrtc-linux-armv7
            dist/olcrtc-linux-mips
            dist/olcrtc-linux-mipsle
            dist/SHA256SUMS

      # Housekeeping: keep only the most recent NIGHTLY_KEEP nightly-* prereleases so old
      # build outputs don't pile up. Release assets are free and uncounted toward GitHub's
      # metered Actions storage, so this is a deterministic disk/tidiness cap rather than a
      # billing trigger. Uses github-script (runner-bundled node; no gh/jq/curl dependency)
      # and the already-granted contents:write token. Runs on every night, including
      # no-build nights (the skipped build steps above are not failures).
      - name: Prune old nightly prereleases (keep latest 10)
        uses: actions/github-script@v7
        env:
          NIGHTLY_KEEP: '10'
        with:
          script: |
            const KEEP = parseInt(process.env.NIGHTLY_KEEP, 10) || 10;
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo, per_page: 100,
            });
            const nightly = releases
              .filter(r => r.prerelease && r.tag_name.startsWith('nightly-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); // newest first
            const stale = nightly.slice(KEEP);
            core.info(`nightly prereleases: ${nightly.length} total, keeping ${Math.min(KEEP, nightly.length)}, deleting ${stale.length}.`);
            for (const r of stale) {
              core.info(`deleting release ${r.tag_name} (id ${r.id}, created ${r.created_at})`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: r.id });
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${r.tag_name}` });
                core.info(`deleted tag ${r.tag_name}`);
              } catch (e) {
                core.warning(`could not delete tag ${r.tag_name}: ${e.message}`);
              }
            }
